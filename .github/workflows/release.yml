name: Release

on:
  push:
    tags:
      - "v*"

env:
  GOPRIVATE: github.com/agend-sh/*
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  id-token: write # keyless cosign signing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Nudge the self-updating tap so brew users don't wait for its next
      # scheduled poll. Best-effort: GITHUB_TOKEN can't dispatch cross-repo,
      # so failures only log — the tap's cron catches up regardless.
      - name: Poke homebrew-tap update (best-effort)
        if: ${{ !contains(github.ref_name, '-') }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run update-formula.yml -R agend-sh/homebrew-tap || echo "cross-repo dispatch unavailable; tap cron will pick it up"
