name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GOPRIVATE: github.com/agend-sh/*
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o agend ./cmd/agend/

      - name: Run tests
        run: go test ./...

      - name: Vet
        run: go vet ./...

      # Cross-compile check for the platforms the windows/ubuntu runners
      # don't cover natively, so a GOOS-specific break can't reach a release.
      - name: Cross-compile (darwin, windows/arm64)
        if: matrix.os == 'ubuntu-latest'
        run: |
          GOOS=darwin GOARCH=arm64 go build ./...
          GOOS=windows GOARCH=arm64 go build ./...
