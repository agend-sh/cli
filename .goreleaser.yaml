version: 2

project_name: agend

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/agend
    binary: agend
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    # Windows gets a zip (native extraction, and what `agend update` expects
    # there — see internal/cmd/update.go archiveName).
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Keyless (Sigstore) signature over checksums.txt. Verifying the signature +
# checksums proves the artifacts came from this repo's release workflow:
#   cosign verify-blob \
#     --certificate checksums.txt.pem --signature checksums.txt.sig \
#     --certificate-identity-regexp 'github.com/agend-sh/cli' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     checksums.txt
signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - --yes
      - ${artifact}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

# The Homebrew formula is NOT pushed from here: agend-sh/homebrew-tap updates
# itself (.github/workflows/update-formula.yml polls the latest release and
# regenerates Formula/agend.rb from checksums.txt with its own GITHUB_TOKEN).
# The old brews push needed a cross-repo PAT that kept expiring and failing
# this release after the artifacts were already published.

release:
  github:
    owner: agend-sh
    name: cli
  prerelease: auto
