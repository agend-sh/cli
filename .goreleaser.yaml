version: 2

project_name: agend

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/agend
    binary: agend
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Keyless (Sigstore) signature over checksums.txt. Verifying the signature +
# checksums proves the artifacts came from this repo's release workflow:
#   cosign verify-blob \
#     --certificate checksums.txt.pem --signature checksums.txt.sig \
#     --certificate-identity-regexp 'github.com/agend-sh/cli' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     checksums.txt
signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - --yes
      - ${artifact}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: agend-sh
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://agend.sh"
    description: "CLI for agend — remote environments for AI agents"
    license: "MIT"
    install: |
      bin.install "agend"
    test: |
      system "#{bin}/agend", "--version"
    # Push the generated formula to agend-sh/homebrew-tap on each real release.
    # Requires the HOMEBREW_TAP_TOKEN secret (a PAT with write to homebrew-tap);
    # the default GITHUB_TOKEN can't push to a different repo. Skips prereleases.
    skip_upload: "auto"

release:
  github:
    owner: agend-sh
    name: cli
  prerelease: auto
